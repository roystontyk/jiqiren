name: Nanobot Free Agent (Public Secure)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    # This 'if' check prevents the bot from running on random PRs from strangers
    if: github.event_name != 'pull_request' 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot
        run: pip install nanobot-ai

      - name: Purge Webhook Conflicts
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"

      - name: Run Nanobot Gateway
        timeout-minutes: 340 
        env:
          # AI & Search
          NANOBOT_PROVIDERS__GEMINI__API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANOBOT_AGENTS__DEFAULTS__MODEL: "gemini/gemini-3.1-flash-lite-preview"
          SEARCH_ENGINE: "duckduckgo"
          
          # Telegram Security
          NANOBOT_CHANNELS__TELEGRAM__ENABLED: "true"
          NANOBOT_CHANNELS__TELEGRAM__TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # CRITICAL: This whitelist is your only defense if someone gets your bot link
          NANOBOT_CHANNELS__TELEGRAM__ALLOW_FROM: '["${{ secrets.TELEGRAM_USER_ID }}"]'
          
          # Auth Backups
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: nanobot gateway

      - name: Save and Push Reports
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Only add .md and .json (memory) files
          git add *.md *.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to save."
          else
            git commit -m "Bot Memory Update: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
