name: Nanobot Free Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Crucial: This allows the bot to save files back to your repo

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can push changes back

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot
        run: pip install nanobot-ai

      - name: Purge Webhook Conflicts
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"

      - name: Run Nanobot Gateway
        timeout-minutes: 340 # Shuts down just before the 6-hour cron restart
        env:
          # LLM Config
          NANOBOT_PROVIDERS__GEMINI__API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANOBOT_AGENTS__DEFAULTS__MODEL: "gemini/gemini-3.1-flash-lite-preview"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Telegram Config
          NANOBOT_CHANNELS__TELEGRAM__ENABLED: "true"
          NANOBOT_CHANNELS__TELEGRAM__TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NANOBOT_CHANNELS__TELEGRAM__ALLOW_FROM: '["${{ secrets.TELEGRAM_USER_ID }}"]'
          
          # Forced Free Search
          SEARCH_ENGINE: "duckduckgo"
          DEFAULT_SEARCH_PROVIDER: "duckduckgo"
        run: nanobot gateway

      - name: Save and Push Reports
        if: always() # Ensures reports are saved even if the bot is stopped
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.md
          # Only commit if there are actually changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-save: New Property Report" && git push)
