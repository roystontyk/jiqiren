name: Adaptive Nanobot Gateway

on:
  workflow_dispatch: # Run it when you want to use it
  schedule:
    - cron: '30 21 * * *' # Auto-start for your morning briefing

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nanobot & Dependencies
        run: |
          pip install nanobot-ai
          # Install Node for MCP tools (Web search, etc)
          sudo apt-get install -y nodejs npm 
      - name: Run Adaptive Gateway
        run: nanobot gateway
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
