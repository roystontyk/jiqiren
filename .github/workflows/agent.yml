name: Nanobot Safe Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot
        run: pip install nanobot-ai

      # We initialize first, then overwrite the file it creates
      - name: Initialize Nanobot
        run: nanobot onboard

      - name: Purge Webhook Conflicts
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"

      # FIXED: Explicitly creating the directory and using the full runner path
      - name: Create Isolated Config
        run: |
          mkdir -p /home/runner/.nanobot
          cat <<EOF > /home/runner/.nanobot/config.json
          {
            "providers": {
              "google": {
                "apiKey": "${{ secrets.GEMINI_API_KEY }}"
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "allowFrom": ["${{ secrets.TELEGRAM_USER_ID }}"]
              }
            },
            "agents": {
              "defaults": {
                "model": "google/gemini-1.5-flash",
                "temperature": 0.3
              }
            }
          }
          EOF

      # Debug step: This will show us if the file actually exists and has content
      - name: Verify Config
        run: |
          ls -a /home/runner/.nanobot
          grep -q "apiKey" /home/runner/.nanobot/config.json && echo "Config is populated" || echo "Config is EMPTY"

      - name: Run Nanobot Gateway
        run: nanobot gateway
