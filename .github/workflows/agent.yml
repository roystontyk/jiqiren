name: Nanobot Free Agent (Public Secure)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    if: github.event_name != 'pull_request' 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot and Search Fix
        run: |
          pip install nanobot-ai duckduckgo-search==7.2.1

      - name: Purge and Reset Webhook
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"
          sleep 2

      - name: Run Nanobot Gateway
        timeout-minutes: 340 
        env:
          # AI & Search
          NANOBOT_PROVIDERS__GEMINI__API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANOBOT_AGENTS__DEFAULTS__MODEL: "gemini/gemini-3.1-flash-lite-preview"
          
          # Force DuckDuckGo
          SEARCH_ENGINE: "duckduckgo"
          WEB_SEARCH_PROVIDER: "duckduckgo"
          NANOBOT_TOOLS__WEB__SEARCH__PROVIDER: "duckduckgo"
          DDG_SAFE_SEARCH: "MODERATE"
          
          # Telegram Config
          NANOBOT_CHANNELS__TELEGRAM__ENABLED: "true"
          NANOBOT_CHANNELS__TELEGRAM__TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Fix: Removed outer quotes so GitHub passes this as a valid JSON list
          NANOBOT_CHANNELS__TELEGRAM__ALLOW_FROM: ["${{ secrets.TELEGRAM_USER_ID }}"]
          
          # Workspace & Identity
          NANOBOT_WORKSPACE: "."
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: nanobot gateway

      - name: Save and Push Reports
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.md *.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to save."
          else
            git commit -m "Jiqiren Memory Update: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
