name: Nanobot Safe Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot
        run: pip install nanobot-ai

      - name: Initialize Nanobot
        run: nanobot onboard

      # FIXED: Added the actual secret variable into the URL
      - name: Purge Webhook Conflicts
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.AGENT_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"

      # FIXED: Changed provider name to 'google' and ensured indentation is correct
      - name: Create Isolated Config
        run: |
          cat <<EOF > /home/runner/.nanobot/config.json
          {
            "providers": {
              "google": {
                "apiKey": "${{ secrets.GEMINI_API_KEY }}"
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "token": "${{ secrets.AGENT_BOT_TOKEN }}",
                "allowFrom": ["${{ secrets.TELEGRAM_USER_ID }}"]
              }
            },
            "agents": {
              "defaults": {
                "model": "google/gemini-1.5-flash",
                "temperature": 0.3
              }
            }
          }
          EOF

      - name: Run Nanobot Gateway
        run: nanobot gateway
